<div class="login-wrapper">

  <div class="left-panel">
    <div class="overlay"></div>

    <div class="bg-image"></div>

  </div>

  <div class="right-panel">
    <div class="form-container">

      <div class="brand">
        <div class="logo-circle">
          <span class="logo-icon">🚢</span>
        </div>
        <div>
          <div class="brand-name">CargoTrust</div>
          <div class="brand-tag">Plateforme d'importation</div>
        </div>
      </div>

      <h2 class="form-title">Bon retour 👋</h2>
      <p class="form-sub">Connectez-vous à votre espace</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <div class="field-group" [class.has-error]="isFieldInvalid('email')">
          <label class="field-label">Adresse email</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input
              type="email"
              formControlName="email"
              class="field-input"
              placeholder="vous@exemple.com"
              autocomplete="email"
            />
          </div>
          <span class="error-msg" *ngIf="isFieldInvalid('email')">
            {{ getEmailError() }}
          </span>
        </div>

        <div class="field-group" [class.has-error]="isFieldInvalid('password')">
          <label class="field-label">Mot de passe</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="field-input"
              placeholder="Votre mot de passe"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pwd" (click)="togglePassword()">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
          <span class="error-msg" *ngIf="isFieldInvalid('password')">
            Le mot de passe est requis
          </span>
        </div>

        <div class="forgot-row">
          <a href="#" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <div class="alert-error" *ngIf="loginError">
          ⚠️ {{ loginError }}
        </div>

        <button type="submit" class="btn-login" [class.loading]="isLoading" [disabled]="isLoading">
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>

      </form>

      <div class="divider"><span>ou</span></div>

      <p class="register-cta">
        Pas encore de compte ?
        <a routerLink="/register" class="register-link">Créer un compte</a>
      </p>

    </div>
  </div>

</div>
