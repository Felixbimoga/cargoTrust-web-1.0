<div class="toast-container">
  @for (toast of toasts; track toast.id) {
    <div class="toast" [class.toast--success]="toast.type === 'success'" [class.toast--error]="toast.type === 'error'">
      <div class="toast__icon">
        @if (toast.type === 'success') {
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
            <polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        } @else {
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
            <line x1="3" y1="3" x2="9" y2="9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="9" y1="3" x2="3" y2="9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        }
      </div>
      <div class="toast__body">
        <p class="toast__title">{{ toast.title }}</p>
        <p class="toast__message">{{ toast.message }}</p>
      </div>
      <button class="toast__close" (click)="remove(toast.id)">✕</button>
    </div>
  }
</div>
